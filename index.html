<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexLink</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #f7fafc; }
        .container { max-width: 800px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="container mx-auto p-6 bg-white rounded-lg shadow-xl text-center">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">ApexLink: Shorten & Track</h1>
        <p class="text-lg text-gray-600 mb-8">Simple, custom URLs with powerful analytics. No ads, just insights.</p>
        <div class="space-y-4 mb-8">
            <input type="url" id="longUrl" placeholder="Enter your long URL here" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
            <input type="text" id="customSlug" placeholder="Optional: Custom Slug (e.g., my-brand)" class="w-full p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            <button id="shortenBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-md transition duration-300">Create Short Link</button>
        </div>
        <div id="result" class="text-lg p-4 bg-gray-100 rounded-md hidden">
            <p class="font-semibold mb-2">Your Short Link:</p>
            <a id="shortenedLink" href="#" target="_blank" class="text-blue-600 hover:underline break-words"></a>
            <p id="clickCount" class="mt-2 text-gray-700"></p>
        </div>
        <p class="mt-8 text-sm text-gray-500">Unlock advanced tracking & more links for just $9.99!</p>
    </div>
    <script>
        document.getElementById('shortenBtn').addEventListener('click', async () => {
            const longUrl = document.getElementById('longUrl').value;
            const customSlug = document.getElementById('customSlug').value;
            if (!longUrl) {
                alert('Please enter a URL!');
                return;
            }
            document.getElementById('result').classList.add('hidden');
            document.getElementById('shortenedLink').href = '#';
            document.getElementById('shortenedLink').textContent = '';
            document.getElementById('clickCount').textContent = '';

            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl, customSlug })
                });
                const data = await res.json();

                if (res.ok) {
                    const shortUrl = `${window.location.origin}/${data.slug}`;
                    document.getElementById('shortenedLink').href = shortUrl;
                    document.getElementById('shortenedLink').textContent = shortUrl;
                    document.getElementById('clickCount').textContent = 'Clicks: 0';
                    document.getElementById('result').classList.remove('hidden');
                } else {
                    alert(data.error || 'Failed to shorten URL');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An unexpected error occurred.');
            }
        });
    </script>
</body>
</html>
